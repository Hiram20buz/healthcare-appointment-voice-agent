version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medical_postgres_container
    restart: always
    environment:
      - POSTGRES_DB=medical_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_medical_data:/var/lib/postgresql/data

  telephony_agent:
    build: .
    container_name: medical_telephony_agent
    restart: always
    # Loads keys for LiveKit, Deepgram, and OpenAI
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/medical_db
    depends_on:
      - db

volumes:
  postgres_medical_data: